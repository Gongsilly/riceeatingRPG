<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>햄삐햄삐 도쿄여행 ❤️</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .timeline-line::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 20px;
      bottom: 0;
      width: 2px;
      background: #e5e7eb;
      transform: translateX(-50%);
    }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const CATEGORY = {
      쇼핑:  { icon: "🛍️", bg: "bg-pink-50",   text: "text-pink-600",   border: "border-pink-200" },
      맛집:  { icon: "🍜", bg: "bg-orange-50", text: "text-orange-600", border: "border-orange-200" },
      관광:  { icon: "🗺️", bg: "bg-sky-50",    text: "text-sky-600",    border: "border-sky-200" },
      교통:  { icon: "✈️", bg: "bg-violet-50", text: "text-violet-600", border: "border-violet-200" },
      숙소:  { icon: "🏨", bg: "bg-emerald-50",text: "text-emerald-600",border: "border-emerald-200" },
      카페:  { icon: "☕", bg: "bg-amber-50",  text: "text-amber-600",  border: "border-amber-200" },
    };

    const DAY_THEME = [
      { gradient: "from-violet-500 to-indigo-600",  light: "bg-indigo-50",  dot: "bg-indigo-400",  tab: "from-violet-500 to-indigo-600" },
      { gradient: "from-pink-500 to-rose-500",       light: "bg-rose-50",    dot: "bg-rose-400",    tab: "from-pink-500 to-rose-500" },
      { gradient: "from-purple-500 to-violet-600",   light: "bg-purple-50",  dot: "bg-purple-400",  tab: "from-purple-500 to-violet-600" },
      { gradient: "from-orange-400 to-amber-500",    light: "bg-amber-50",   dot: "bg-amber-400",   tab: "from-orange-400 to-amber-500" },
    ];

    const travelData = [
      {
        date: "4/10",
        day: "Day 1",
        week: "목요일",
        theme: "입국의 날",
        emoji: "🛬",
        places: [
          { time: "14:45", name: "인천국제공항 출발",    detail: "LJ209 탑승 → 나리타공항(NRT) 17:15 도착",  category: "교통", map: "Incheon International Airport" },
          { time: "17:15", name: "나리타국제공항 도착",  detail: "입국수속 후 수하물 수취",                   category: "교통", map: "Narita International Airport Tokyo" },
          { time: "18:30", name: "공항리무진 버스",       detail: "나리타 → 아카사카 호텔 이동 (약 2시간 30분)", category: "교통", map: "Narita Airport Limousine Bus Tokyo" },
          { time: "21:00", name: "아카사카 어반 호텔 신관", detail: "체크인 / 여행 숙소",                    category: "숙소", map: "Akasaka Urban Hotel Annex Tokyo" },
          { time: "21:00", name: "SEIJO ISHII",          detail: "숙소 근처 고급 슈퍼마켓 / 야식 & 간식 구매", category: "쇼핑", map: "Seijo Ishii Akasaka Tokyo" },
        ],
      },
      {
        date: "4/11",
        day: "Day 2",
        week: "금요일",
        theme: "긴자 & 롯폰기",
        emoji: "🌃",
        places: [
          { time: "09:00", name: "편의점 조식",              detail: "호텔 근처 편의점에서 아침식사",                   category: "맛집", map: "Convenience store Akasaka Tokyo" },
          { time: "10:00", name: "하카타유라쿠초",            detail: "유명 만쥬 가게 / 긴자·유라쿠초",                   category: "맛집", map: "博多風美庵 有楽町 Tokyo" },
          { time: "10:30", name: "긴자 로프트",               detail: "생활잡화 & 문구 쇼핑",                            category: "쇼핑", map: "Ginza Loft Tokyo" },
          { time: "11:00", name: "핸즈 (Hands)",              detail: "다양한 생활용품 & 잡화",                          category: "쇼핑", map: "Hands Ginza Tokyo" },
          { time: "11:30", name: "무인양품 (MUJI)",            detail: "긴자 플래그십 스토어",                            category: "쇼핑", map: "MUJI Ginza Tokyo" },
          { time: "12:00", name: "스탠다드프로덕트",           detail: "다이소 프리미엄 라인 / 저렴한 생활잡화",           category: "쇼핑", map: "Standard Products Ginza Tokyo" },
          { time: "12:30", name: "이토야",                    detail: "긴자 유명 고급 문구점",                            category: "쇼핑", map: "Itoya Ginza Tokyo" },
          { time: "13:00", name: "빌스 (bills)",               detail: "세계 최고의 아침식사 레스토랑",                    category: "맛집", map: "bills Ginza Tokyo" },
          { time: "14:00", name: "도버 스트리트 마켓",         detail: "컨셉 멀티샵 / 명품 & 아트",                       category: "쇼핑", map: "Dover Street Market Ginza Tokyo" },
          { time: "14:30", name: "마리아쥬 프레르",            detail: "프랑스 유명 티 살롱",                              category: "카페", map: "Mariage Freres Ginza Tokyo" },
          { time: "15:00", name: "Seisuke knife",              detail: "일본 전통 식도 & 칼 전문점",                       category: "쇼핑", map: "Seisuke Knife Ginza Tokyo" },
          { time: "15:30", name: "스시마도리",                 detail: "예약 가능 스시 맛집",                              category: "맛집", map: "Sushi Madori Ginza Tokyo" },
          { time: "16:30", name: "시아와세노 팬케이크",        detail: "휴식 & 디저트 / 행복의 팬케이크",                  category: "카페", map: "幸せのパンケーキ Ginza Tokyo" },
          { time: "18:00", name: "롯폰기힐즈",                 detail: "야경 감상 & 쇼핑",                                category: "관광", map: "Roppongi Hills Tokyo" },
          { time: "18:30", name: "롯폰기 꽃차 카페",           detail: "롯폰기점 / 꽃차 전문 카페",                        category: "카페", map: "flower tea Roppongi Tokyo" },
          { time: "19:30", name: "동키호테 롯폰기점",          detail: "심야 쇼핑 & 기념품",                               category: "쇼핑", map: "Don Quijote Roppongi Tokyo" },
        ],
      },
      {
        date: "4/12",
        day: "Day 3",
        week: "토요일",
        theme: "신주쿠 & 시부야 & 하라주쿠",
        emoji: "🌸",
        places: [
          { time: "09:00", name: "롯폰기 공원",               detail: "아침 산책으로 하루 시작",                          category: "관광", map: "Roppongi Park Tokyo" },
          { time: "10:00", name: "디즈니 플래그십스토어",      detail: "신주쿠 / 디즈니 공식 대형 스토어",                category: "쇼핑", map: "Disney flagship store Shinjuku Tokyo" },
          { time: "10:30", name: "니큐토 타마고",              detail: "신주쿠 유명 달걀 간식",                            category: "맛집", map: "二丁目のたまご Shinjuku Tokyo" },
          { time: "12:00", name: "SHIRO (신주쿠 점심)",        detail: "신주쿠 Newoman 내 식당",                           category: "맛집", map: "SHIRO Shinjuku Newoman Tokyo" },
          { time: "13:00", name: "Slow Newoman",               detail: "가족 선물 쇼핑 / 신주쿠 루미네",                   category: "쇼핑", map: "Newoman Shinjuku Tokyo" },
          { time: "14:00", name: "카페 알리아",                detail: "신주쿠 감성 카페",                                category: "카페", map: "Cafe Alia Shinjuku Tokyo" },
          { time: "15:00", name: "신주쿠 교엔",                detail: "국립 정원 / 봄 벚꽃 산책",                         category: "관광", map: "Shinjuku Gyoen National Garden" },
          { time: "16:00", name: "파르코 (PARCO)",             detail: "시부야 / 트렌디한 쇼핑몰",                         category: "쇼핑", map: "PARCO Shibuya Tokyo" },
          { time: "16:30", name: "포켓몬센터",                 detail: "포켓몬 공식 스토어",                               category: "쇼핑", map: "Pokemon Center Mega Tokyo Shibuya" },
          { time: "17:00", name: "시부야 스크램블 교차로",     detail: "시부야의 상징 / 세계에서 가장 바쁜 교차로",        category: "관광", map: "Shibuya Scramble Crossing Tokyo" },
          { time: "17:30", name: "시부야스카이",               detail: "일몰 감상 / 시부야 옥상 전망대",                   category: "관광", map: "Shibuya Sky observation deck Tokyo" },
          { time: "18:30", name: "하라주쿠",                   detail: "다케시타 거리 탐방",                               category: "관광", map: "Harajuku Takeshita Street Tokyo" },
          { time: "19:00", name: "니코앤도쿄",                 detail: "잡화몰 쇼핑",                                     category: "쇼핑", map: "niko and TOKYO Harajuku" },
          { time: "19:30", name: "레드락 (Red Rock)",          detail: "하라주쿠 유명 로스트비프 덮밥",                    category: "맛집", map: "Red Rock Harajuku Tokyo" },
          { time: "20:30", name: "코스메 도쿄",                detail: "화장품 & 뷰티 쇼핑",                               category: "쇼핑", map: "Cosme Tokyo Harajuku" },
        ],
      },
      {
        date: "4/13",
        day: "Day 4",
        week: "일요일",
        theme: "귀국의 날",
        emoji: "🏠",
        places: [
          { time: "09:00", name: "히에 신사",                  detail: "아카사카 / 신사 참배",                             category: "관광", map: "Hie Shrine Akasaka Tokyo" },
          { time: "10:00", name: "스기야국",                   detail: "보충 쇼핑 / 마지막 기념품",                        category: "쇼핑", map: "Sugiya Akasaka Tokyo" },
          { time: "12:00", name: "모쥬 라멘",                  detail: "도쿄 마지막 점심식사",                             category: "맛집", map: "もつ次郎 라멘 Tokyo" },
          { time: "16:00", name: "공항리무진 출발",             detail: "호텔 → 나리타공항 이동 (약 2시간 소요)",           category: "교통", map: "Narita Airport Limousine Bus Tokyo" },
          { time: "18:00", name: "나리타공항 도착",            detail: "수속 완료 후 면세점 & 눈물의 마지막 저녁 🥺",      category: "맛집", map: "Narita International Airport Terminal 1" },
          { time: "19:15", name: "나리타공항 출발",            detail: "LJ212 탑승 → 인천공항(ICN) 21:45 도착",            category: "교통", map: "Narita International Airport" },
        ],
      },
    ];

    function CategoryBadge({ category }) {
      const c = CATEGORY[category];
      if (!c) return null;
      return (
        <span className={`inline-flex items-center gap-1 text-xs font-semibold px-2.5 py-0.5 rounded-full border ${c.bg} ${c.text} ${c.border}`}>
          <span>{c.icon}</span>{category}
        </span>
      );
    }

    function PlaceCard({ place, dotColor }) {
      const mapsUrl = `https://www.google.com/maps/search/${encodeURIComponent(place.map)}`;
      return (
        <div className="flex gap-3 group">
          {/* 시간 */}
          <div className="w-12 shrink-0 text-right pt-3">
            <span className="text-xs font-medium text-gray-400">{place.time}</span>
          </div>

          {/* 타임라인 */}
          <div className="flex flex-col items-center shrink-0">
            <div className={`w-2.5 h-2.5 rounded-full mt-3.5 shrink-0 ring-2 ring-white ${dotColor} group-hover:scale-125 transition-transform`}></div>
            <div className="w-px flex-1 bg-gray-200 mt-1"></div>
          </div>

          {/* 카드 */}
          <div className="flex-1 pb-3">
            <div className="bg-white rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-all duration-200 p-3.5">
              <div className="flex items-start justify-between gap-2">
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 flex-wrap mb-1">
                    <span className="font-bold text-gray-800 text-sm leading-tight">{place.name}</span>
                    <CategoryBadge category={place.category} />
                  </div>
                  <p className="text-xs text-gray-500 leading-relaxed">{place.detail}</p>
                </div>
                <a
                  href={mapsUrl}
                  target="_blank"
                  rel="noopener noreferrer"
                  className="shrink-0 flex items-center gap-1 text-xs font-semibold bg-blue-50 hover:bg-blue-600 hover:text-white text-blue-600 px-2.5 py-1.5 rounded-xl transition-all duration-200 border border-blue-100 whitespace-nowrap"
                >
                  📍 지도
                </a>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [activeDay, setActiveDay] = useState(0);
      const theme = DAY_THEME[activeDay];
      const day = travelData[activeDay];

      return (
        <div className="min-h-screen bg-slate-50">

          {/* ── 헤더 ── */}
          <header className="bg-gradient-to-br from-rose-500 via-pink-500 to-orange-400 text-white pt-10 pb-6 px-4 shadow-xl">
            <div className="max-w-xl mx-auto text-center">
              <div className="text-4xl mb-2">🌸</div>
              <h1 className="text-2xl sm:text-3xl font-extrabold tracking-tight mb-1">
                햄삐햄삐 도쿄여행 ❤️
              </h1>
              <p className="text-pink-100 text-sm mb-4">2025. 04. 10 ~ 04. 13 · 3박 4일</p>
              <div className="flex justify-center flex-wrap gap-2 text-xs">
                <span className="bg-white/20 backdrop-blur rounded-full px-3 py-1.5 font-medium">📍 도쿄</span>
                <span className="bg-white/20 backdrop-blur rounded-full px-3 py-1.5 font-medium">✈️ LJ209 / LJ212</span>
                <span className="bg-white/20 backdrop-blur rounded-full px-3 py-1.5 font-medium">🏨 아카사카 어반 호텔</span>
              </div>
            </div>
          </header>

          {/* ── 카테고리 범례 ── */}
          <div className="max-w-xl mx-auto px-4 py-3">
            <div className="flex flex-wrap gap-1.5 justify-center">
              {Object.entries(CATEGORY).map(([name, c]) => (
                <span key={name} className={`text-xs font-medium px-2.5 py-1 rounded-full border ${c.bg} ${c.text} ${c.border}`}>
                  {c.icon} {name}
                </span>
              ))}
            </div>
          </div>

          {/* ── 날짜 탭 ── */}
          <div className="max-w-xl mx-auto px-4 mb-2">
            <div className="flex gap-2 overflow-x-auto scrollbar-hide pb-1">
              {travelData.map((d, i) => {
                const t = DAY_THEME[i];
                const isActive = activeDay === i;
                return (
                  <button
                    key={i}
                    onClick={() => setActiveDay(i)}
                    className={`flex-1 min-w-[72px] flex flex-col items-center py-2.5 px-2 rounded-2xl text-sm font-bold transition-all duration-200 border
                      ${isActive
                        ? `bg-gradient-to-b ${t.tab} text-white shadow-lg border-transparent scale-105`
                        : "bg-white text-gray-500 hover:bg-gray-50 border-gray-200"
                      }`}
                  >
                    <span className="text-base">{d.emoji}</span>
                    <span className="text-xs mt-0.5">{d.date}</span>
                    <span className="text-xs font-normal opacity-70">{d.day}</span>
                  </button>
                );
              })}
            </div>
          </div>

          {/* ── 일정 패널 ── */}
          <main className="max-w-xl mx-auto px-4 pb-16">
            {/* 일정 헤더 */}
            <div className={`flex items-center gap-3 rounded-2xl p-4 mb-4 bg-gradient-to-r ${theme.gradient} text-white shadow-md`}>
              <div className="text-3xl">{day.emoji}</div>
              <div>
                <div className="font-extrabold text-lg leading-tight">{day.day} · {day.date} ({day.week})</div>
                <div className="text-white/80 text-sm">{day.theme}</div>
              </div>
              <div className="ml-auto text-white/80 text-sm font-medium">
                총 {day.places.length}곳
              </div>
            </div>

            {/* 타임라인 */}
            <div>
              {day.places.map((place, i) => (
                <PlaceCard key={i} place={place} dotColor={theme.dot} />
              ))}
            </div>
          </main>

          {/* ── 푸터 ── */}
          <footer className="text-center text-xs text-gray-400 pb-8 px-4">
            <div className="mb-1">즐거운 도쿄 여행 되세요! 🌸🗼</div>
            <div>각 장소의 📍 지도 버튼을 누르면 Google Maps로 연결됩니다</div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
